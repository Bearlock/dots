# vim:fileencoding=utf-8:foldmethod=marker

# Tab Bar
include tabbar.conf

# Theme — Catppuccin Kitty Mocha
include themes/mocha.conf

# Font
include font.conf

# Mouse
include mouse.conf

# Keymaps
include keymaps.conf

# This allows the Neovim plugin, folke/zen-mode.nvim, to resize the terminal's
# font whenever it's toggled on
allow_remote_control socket-only
listen_on unix:/tmp/kitty
